# ----- Build Configuration ----- #
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "tfs/__init__.py"

[tool.hatch.build.targets.sdist]
exclude = ["/.github", "/doc", "/tests"]

[tool.hatch.build.targets.wheel]
packages = ["tfs"]

# ----- Project Metadata ----- #

[project]
name = "tfs"
readme = "README.md"
description = "Read and write TFS files."
authors = [{name = "pylhc", email = "pylhc@github.com"}]
license = "MIT"
dynamic = ["version"]
requires-python = ">=3.9"

classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

# ----- Project Dependencies ----- #

dependencies = ["numpy>=1.19.0,<2.0", "pandas>=2.1"]

[project.optional-dependencies]
test = [
    "pytest>=5.2",
    "pytest-cov>=2.9",
    "cpymad>=1.8.1",
    "zstandard>=0.15.2",
]
hdf5 = [
  "h5py>=2.9.0",
  "tables>=3.6.0",
]
docs = [
    "sphinx",
    "sphinx_rtd_theme",
    "sphinx_copybutton",
    "sphinx-prompt",
    "sphinx_codeautolink",
]

[project.urls]
homepage = "https://github.com/pylhc/tfs"
repository = "https://github.com/pylhc/tfs"
documentation = "https://pylhc.github.io/tfs/"
changelog = "https://github.com/pylhc/tfs/blob/master/CHANGELOG.md"

# ----- Dev Tools Configuration ----- #

[tool.isort]
atomic = true
ensure_newline_before_comments = true
filter_files = true
force_grid_wrap = 0
force_single_line = false
include_trailing_comma = true
known_first_party = "pyhdtoolkit"
known_third_party = "pytest"
line_length = 110
lines_between_types = 1
multi_line_output = 3
use_parentheses = true
profile = "black"

[tool.black]
line-length = 120
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | tests/.*/setup.py
  | acc-models-lhc
)/
'''